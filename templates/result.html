<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Result — QuizSpark</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">

    <span class="result-emoji">{{ emoji }}</span>
    <h2>{{ grade }}</h2>
    <p class="subtitle">{{ category }} • {{ username }}</p>

    <!-- Animated score ring -->
    <div class="score-ring-wrap">
      <div class="score-ring">
        <svg viewBox="0 0 120 120" width="140" height="140">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#ff6b9d"/>
              <stop offset="100%" stop-color="#c084fc"/>
            </linearGradient>
          </defs>
          <circle class="score-ring-bg"   cx="60" cy="60" r="54"/>
          <circle class="score-ring-fill" cx="60" cy="60" r="54"/>
        </svg>
        <div class="score-ring-text">
          <span class="score-num">{{ score }}</span>
          <span class="score-denom">/ {{ total }}</span>
        </div>
      </div>
    </div>

    
    <span id="percentValue" data-pct="{{ percent }}" style="display:none"></span>

    <p class="result-grade">{{ percent }}% correct</p>

    <div class="result-actions">
      <a href="/replay" class="btn btn-primary">🔄 Try Again</a>
      <a href="/certificate" class="btn btn-secondary">🏅 Certificate</a>
      <a href="/" class="btn btn-ghost">🏠 Home</a>
    </div>

  </div>
  <script src="{{ url_for('static', filename='quiz.js') }}"></script>
</body>
</html>
