<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizSpark ✨</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <span class="home-emoji">🎯</span>
    <h1>QuizSpark</h1>
    <p class="subtitle">Live trivia questions • 10 categories • Beat the clock</p>

    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form action="/start" method="POST">
      <div class="name-input-wrap">
        <input type="text" name="username" placeholder="Enter your name…"
               maxlength="24" autocomplete="off" required>
        <button type="submit" class="btn btn-primary">Let's Go! 🚀</button>
      </div>
    </form>

    <div class="divider"></div>
    <p class="subtitle" style="font-size:0.82rem">
      Questions powered by <strong>Open Trivia DB</strong> — new questions every round!
    </p>
  </div>
  <script src="{{ url_for('static', filename='quiz.js') }}"></script>
</body>
</html>
